<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="30" viewBox="0 0 1200 30" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4dff"/>
      <stop offset="50%" stop-color="#b266ff"/>
      <stop offset="100%" stop-color="#ff66cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="13" width="1200" height="4" rx="2" fill="url(#grad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
  </rect>
</svg>
